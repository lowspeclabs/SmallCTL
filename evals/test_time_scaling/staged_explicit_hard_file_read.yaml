id: staged_explicit_hard_file_read
task: >-
  Use staged execution with exactly one plan step. First call plan_set. The
  single step must have step_id S1, title "Read hard-step detector", difficulty
  "hard", task "Call file_read once for
  src/smallctl/graph/hard_step_detector.py, then call step_complete with a
  one-line summary that mentions HardStepDetector.", and tool_allowlist
  ["file_read", "step_complete"]. After the plan is approved, execute only that
  step and finish.
tags:
  - test_time_scaling
  - staged
  - explicit_hard
  - read_path
test_time_scaling:
  trigger: explicit
  policy: proposal_then_execute
  max_candidates: 2
  min_candidates: 2
  parallel_max: 2
expectations:
  grounding_required: true
  success_statuses:
    - complete
    - completed
  required_files:
    - src/smallctl/graph/hard_step_detector.py
  required_terms:
    - HardStepDetector
