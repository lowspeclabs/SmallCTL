id: repo_tool_dag_execution
task: >-
  Inspect src/smallctl/graph/tool_dag.py,
  src/smallctl/graph/tool_dag_executor.py, and
  src/smallctl/graph/tool_dag_safety.py, then explain how ToolPlan parallel
  read-only steps are scheduled, validated, and dispatched.
tags:
  - repo_analysis
  - tool_dag
expectations:
  grounding_required: true
  success_statuses:
    - completed
  required_files:
    - src/smallctl/graph/tool_dag.py
    - src/smallctl/graph/tool_dag_executor.py
    - src/smallctl/graph/tool_dag_safety.py
  required_terms:
    - build_execution_dag
    - dispatch_tool_dag
    - assert_parallelizable_steps
