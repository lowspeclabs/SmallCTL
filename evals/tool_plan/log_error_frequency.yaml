id: log_error_frequency
task: >-
  Inspect how recovery failure classes are counted. If local logs are present,
  report the most frequent ERROR class; if logs are absent, explain the code path
  that would aggregate those classes without fabricating counts.
tags:
  - log_investigation
  - errors
expectations:
  grounding_required: true
  success_statuses:
    - completed
  required_files:
    - src/smallctl/recovery_metrics.py
    - src/smallctl/fama/detectors.py
    - src/smallctl/logging_utils.py
  required_terms:
    - failure_events_by_class
    - ERROR
    - counts
