id: coding_test_failure_root_cause
task: >-
  Inspect the tests around ToolPlan observations and runtime metrics. Explain
  which production files would be responsible if worker success-rate assertions
  started failing.
tags:
  - coding
  - tests
expectations:
  grounding_required: true
  success_statuses:
    - completed
  required_files:
    - tests/test_tool_plan_observations.py
    - tests/test_runtime_tool_plan.py
    - src/smallctl/graph/tool_plan_observations.py
    - src/smallctl/graph/runtime_tool_plan.py
  required_terms:
    - worker_success_rate
    - summarize_tool_plan_observations
    - recovery_metrics
