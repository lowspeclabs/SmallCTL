id: remote_install_pihole_debian13
task: >
  On the Debian 13 remote host, install Pi-hole using the official install script
  (curl -sSL https://install.pi-hole.net | bash). The installer will prompt for
  network interface, upstream DNS, and privacy mode. Answer the prompts to complete
  a standard install, then verify that the Pi-hole web admin service is reachable on
  port 80/admin/.
tags:
  - remote_install
  - interactive_installer
  - pihole
  - debian13
disabled: true
expectations:
  grounding_required: false
  success_statuses:
    - completed
  required_terms:
    - pihole
    - interactive_run
    - ssh_session_send
